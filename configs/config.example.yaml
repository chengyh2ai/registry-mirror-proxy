listen_addr: ":443"
upstream: "https://chengyh2go-cn-beijing.cr.volces.com"
upstreams: []

tls_cert_file: "/etc/registry-mirror-proxy/tls.crt"
tls_key_file: "/etc/registry-mirror-proxy/tls.key"

read_timeout: 30s
write_timeout: 0s
idle_timeout: 120s
upstream_timeout: 60s
max_idle_conns: 512
max_redirects: 5
max_concurrent_requests: 0

log_level: info
hide_upstream_errors: true
allow_methods:
  - GET
  - HEAD
  - OPTIONS

enable_metrics: true
enable_ready_check: true

# Optional client allow list. Empty means all clients are allowed.
allowed_client_cidrs: []

# Optional disk cache for blob downloads. Keep disabled until disk sizing is planned.
enable_disk_cache: false
disk_cache_dir: "/var/cache/registry-mirror-proxy"
disk_cache_max_bytes: 0

# Optional additional HTTPS redirect hosts that may be followed internally.
trusted_redirect_hosts: []
