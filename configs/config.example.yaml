listen_addr: ":443"
upstream: "https://chengyh2go-cn-beijing.cr.volces.com"
upstreams: []

# Optional upstream credentials. Prefer REGISTRY_MIRROR_UPSTREAM_USERNAME and
# REGISTRY_MIRROR_UPSTREAM_PASSWORD, or protect this file with mode 0600.
upstream_username: ""
upstream_password: ""

# Optional Volcengine CR temporary credential auto-refresh. When enabled, the
# proxy calls GetAuthorizationToken and uses the returned Username/Token as
# upstream Basic auth.
volc_auth_enabled: false
volc_access_key: ""
volc_secret_key: ""
volc_region: "cn-beijing"
volc_endpoint: "https://cr.cn-beijing.volcengineapi.com"
volc_registry: ""
volc_refresh_before: 10m

tls_cert_file: "/etc/registry-mirror-proxy/tls.crt"
tls_key_file: "/etc/registry-mirror-proxy/tls.key"

read_timeout: 30s
write_timeout: 0s
idle_timeout: 120s
upstream_timeout: 60s
max_idle_conns: 512
max_redirects: 5
max_concurrent_requests: 0

log_level: info
hide_upstream_errors: true
allow_methods:
  - GET
  - HEAD
  - OPTIONS

enable_metrics: true
enable_ready_check: true

# Optional client allow list. Empty means all clients are allowed.
allowed_client_cidrs: []

# Optional disk cache for blob downloads. Keep disabled until disk sizing is planned.
enable_disk_cache: false
disk_cache_dir: "/var/cache/registry-mirror-proxy"
disk_cache_max_bytes: 0

# Optional additional HTTPS redirect hosts that may be followed internally.
trusted_redirect_hosts: []
